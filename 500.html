    </ul>
  </nav>

  <main class="error-main dot-bg">

    <div aria-hidden="true" class="error-decos">
      <span class="deco" style="font-size:52px;color:var(--coral);top:10%;left:4%;--r:-12deg;--dur:4.5s;">★</span>
      <span class="deco" style="font-size:44px;color:var(--yellow);top:14%;right:6%;--r:14deg;--dur:3.8s;--delay:0.5s;">✦</span>
      <span class="deco" style="font-size:34px;color:var(--pink);bottom:20%;left:6%;--r:7deg;--dur:5.2s;--delay:1s;">♥</span>
      <span class="deco" style="font-size:40px;color:var(--mint);bottom:16%;right:5%;--r:-9deg;--dur:4s;--delay:1.8s;">✧</span>
    </div>

    <div class="error-inner">

      <div class="error-badge" style="background:var(--coral-light);">
        <span class="error-code hand">500</span>
        <span class="error-label">server error</span>
      </div>

      <p class="error-msg hand">my bad — something broke on my end 😵</p>

      <div class="error-actions">
        <a href="index.html"                      class="error-btn" style="background:var(--pink-light);  --tilt:-2deg;">
          <span class="error-btn-icon">🏠</span>
          <span class="error-btn-text">take me home</span>
        </a>
        <a href="javascript:location.reload()"    class="error-btn" style="background:var(--coral-light); --tilt:1.5deg;">
          <span class="error-btn-icon">↻</span>
          <span class="error-btn-text">try again</span>
        </a>
        <a href="contact.html"                    class="error-btn" style="background:var(--sky-light);   --tilt:-1deg;">
          <span class="error-btn-icon">✉</span>
          <span class="error-btn-text">contact me</span>
        </a>
      </div>

    </div>
  </main>
